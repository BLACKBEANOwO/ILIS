# 운영 — 모든 접속 값은 환경변수로 주입한다. flyway.clean 은 비활성(전체 스키마 삭제 방지).
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  flyway:
    clean-disabled: true

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

logging:
  level:
    root: INFO
    com.mainlineit.ilis: INFO
