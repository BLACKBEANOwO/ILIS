# 공통 설정 — 환경 종속 값(DB 접속 등)은 프로파일별 파일에서 주입한다.
spring:
  application:
    name: ilis
  profiles:
    default: local
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false
  datasource:
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
