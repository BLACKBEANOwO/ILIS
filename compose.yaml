# 로컬 개발용 PostgreSQL. 운영/개발서버 DB는 이 파일로 관리하지 않는다.
#   기동:  docker compose up -d
#   종료:  docker compose down            (데이터 유지)
#   초기화: docker compose down -v          (볼륨까지 삭제)
services:
  postgres:
    image: postgres:17-alpine
    container_name: ilis-practice-postgres
    environment:
      POSTGRES_DB: ilis
      POSTGRES_USER: ilis
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ilis}   # 로컬 개발 전용 기본값 — 운영 비밀번호 아님
      TZ: Asia/Jakarta
    ports:
      - "5432:5432"
    volumes:
      - ilis-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ilis -d ilis"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ilis-pgdata:
